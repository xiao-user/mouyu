name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: Publish (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
      MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Verify Source
        run: npm run check

      - name: Run Regression Tests
        run: npm run test:regression

      - name: Build And Publish (Signed macOS)
        if: ${{ matrix.os == 'macos-latest' && env.MAC_CSC_LINK != '' && env.MAC_CSC_KEY_PASSWORD != '' && env.APPLE_ID != '' && env.APPLE_APP_SPECIFIC_PASSWORD != '' && env.APPLE_TEAM_ID != '' }}
        env:
          CSC_LINK: ${{ env.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ env.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ env.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ env.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ env.APPLE_TEAM_ID }}
        run: npm run release:github

      - name: Build And Publish (Signed Windows)
        if: ${{ matrix.os == 'windows-latest' && env.WIN_CSC_LINK != '' && env.WIN_CSC_KEY_PASSWORD != '' }}
        env:
          CSC_LINK: ${{ env.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ env.WIN_CSC_KEY_PASSWORD }}
        run: npm run release:github

      - name: Build And Publish (Unsigned Fallback)
        if: ${{ (matrix.os == 'macos-latest' && (env.MAC_CSC_LINK == '' || env.MAC_CSC_KEY_PASSWORD == '' || env.APPLE_ID == '' || env.APPLE_APP_SPECIFIC_PASSWORD == '' || env.APPLE_TEAM_ID == '')) || (matrix.os == 'windows-latest' && (env.WIN_CSC_LINK == '' || env.WIN_CSC_KEY_PASSWORD == '')) }}
        run: npx cross-env CSC_IDENTITY_AUTO_DISCOVERY=false npm run release:github
